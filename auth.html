  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.05) 0%, rgba(59, 130, 246, 0.05) 100%);
      padding: 1rem;
    }

    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 450px;
      padding: 2.5rem;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .auth-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 2rem;
      border-bottom: 2px solid var(--border);
      position: relative;
      z-index: 1;
    }

    .auth-tab {
      flex: 1;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.95rem;
      border-bottom: 3px solid transparent;
      transition: all 0.3s ease;
      position: relative;
      z-index: 2;
    }

    .auth-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .auth-form {
      display: none;
    }

    .auth-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text);
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .form-group input:focus {
      outline: 2px solid var(--primary);
      border-color: transparent;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .form-group small {
      display: block;
      margin-top: 0.25rem;
      color: var(--muted);
      font-size: 0.85rem;
    }

    .form-group small.error {
      color: #dc2626;
      display: none;
    }

    .form-group small.error.show {
      display: block;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .checkbox-group input {
      width: auto !important;
      margin: 0;
    }

    .checkbox-group label {
      margin: 0;
      font-weight: 500;
      cursor: pointer;
    }

    .forgot-password {
      text-align: right;
      margin-bottom: 1.5rem;
    }

    .forgot-password a {
      color: var(--primary);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .forgot-password a:hover {
      text-decoration: underline;
    }

    .auth-btn {
      width: 100%;
      padding: 0.75rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-bottom: 1rem;
    }

    .auth-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    .divider {
      text-align: center;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .divider::before {
      content: '';
      display: inline-block;
      width: 100%;
      height: 1px;
      background: var(--border);
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    .divider::after {
      content: '';
      display: inline-block;
      width: 100%;
      height: 1px;
      background: var(--border);
      vertical-align: middle;
      margin-left: 0.5rem;
    }

    .social-login {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .social-btn {
      padding: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .social-btn:hover {
      background: var(--accent-bg);
      border-color: var(--primary);
    }


    .auth-footer {
      text-align: center;
      margin-top: 1.5rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .auth-footer a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .auth-footer a:hover {
      text-decoration: underline;
    }

    .message {
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
      text-align: center;
      display: none;
    }

    .message.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .message.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
    }

    .back-link:hover {
      text-decoration: underline;
    }
  </style>

<body>
  <div class="auth-container">
    <div class="auth-card">
      <a href="index.html" class="back-link">&larr; Back to Home</a>
      <a href="contact.html" class="back-link" style="margin-left: 0.75rem;">Contact</a>

      <div class="auth-header">
        <h1>Kaarlight</h1>
        <p>Find opportunities or post jobs</p>
      </div>

      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-tab="login">Sign In</button>
        <button type="button" class="auth-tab" data-tab="signup">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <form id="login-form" class="auth-form active">
        <div id="login-message" class="message"></div>

        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" name="email" autocomplete="email" required placeholder="your@email.com">
          <small class="error" id="error-login-email"></small>
        </div>

        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" name="password" autocomplete="current-password" required placeholder="Enter your password">
          <small class="error" id="error-login-password"></small>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="login-remember" name="remember">
          <label for="login-remember">Remember me</label>
        </div>

        <div class="forgot-password">
          <a href="reset-password.html">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>

        <div class="divider">OR</div>

        <div class="social-login">
          <button type="button" class="social-btn" data-provider="Google">Google</button>
          <button type="button" class="social-btn" data-provider="Facebook">Facebook</button>
          <button type="button" class="social-btn apple" data-provider="Apple">Apple</button>
        </div>

        <div class="auth-footer">
          Don't have an account? <a href="#" data-auth-tab-link="signup">Create one</a>
        </div>
      </form>

      <!-- SIGNUP FORM -->
      <form id="signup-form" class="auth-form">
        <div id="signup-message" class="message"></div>

        <div class="form-group">
          <label for="signup-fullname">Full Name</label>
          <input type="text" id="signup-fullname" name="fullname" autocomplete="name" required placeholder="Your full name" maxlength="100">
          <small class="error" id="error-signup-fullname"></small>
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" name="email" autocomplete="email" required placeholder="your@email.com">
          <small class="error" id="error-signup-email"></small>
        </div>

        <div class="form-group">
          <label for="signup-phone">Phone Number (Optional)</label>
          <input type="tel" id="signup-phone" name="phone" autocomplete="tel" placeholder="+93 700 123 456">
          <small>For communication with employers</small>
          <small class="error" id="error-signup-phone"></small>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" name="password" autocomplete="new-password" required placeholder="At least 6 characters">
          <small>At least 6 characters with uppercase and number</small>
          <small class="error" id="error-signup-password"></small>
        </div>

        <div class="form-group">
          <label for="signup-confirm">Confirm Password</label>
          <input type="password" id="signup-confirm" name="confirm" autocomplete="new-password" required placeholder="Confirm your password">
          <small class="error" id="error-signup-confirm"></small>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="signup-terms" name="terms" required>
          <label for="signup-terms">I agree to the <a href="terms.html" style="color: var(--primary);">Terms of Service</a></label>
        </div>

        <button type="submit" class="auth-btn">Create Account</button>

        <div class="divider">OR</div>

        <div class="social-login">
          <button type="button" class="social-btn" data-provider="Google">Google</button>
          <button type="button" class="social-btn" data-provider="Facebook">Facebook</button>
          <button type="button" class="social-btn apple" data-provider="Apple">Apple</button>
        </div>

        <div class="auth-footer">
          Already have an account? <a href="#" data-auth-tab-link="login">Sign in</a>
        </div>
      </form>
    </div>
  </div>
