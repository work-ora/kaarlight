<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <div class="container nav-row">
      <div class="brand">
        <a href="index.html" class="brand-link">
          <img src="site-icon-192.png" alt="Kaarlight Logo" class="site-logo" onerror="this.style.display='none'" loading="eager" fetchpriority="high" decoding="async" width="40" height="40">
          <div>
            <h1 class="site-title">Kaarlight</h1>
          </div>
        </a>
      </div>
      <nav class="main-nav" aria-label="Primary Navigation">
        <a href="index.html" class="nav-link">Home</a>
        <a href="jobs.html" class="nav-link">Jobs</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="post-job.html" class="nav-link cta">Post Job</a>
      </nav>
      <div class="nav-auth">
        <span id="user-display" style="color: var(--muted); font-size: 0.9rem; margin-right: 1rem; display: none;"></span>
        <a href="profile.html" id="profile-link" class="nav-link" style="color: var(--primary); display: none;">My Profile</a>
        <a href="settings.html" id="settings-link" class="nav-link" style="color: var(--primary); display: none;">Settings</a>

    </div>

  <main id="main-content" class="container page-shell reset-wrap">
    <section class="reset-card" aria-labelledby="reset-title">
      <h2 id="reset-title">Reset Password</h2>
      <p>Enter your account email and we will send you a reset link.</p>

      <form id="reset-form">
        <label for="reset-email">Email Address</label>
        <input id="reset-email" type="email" required autocomplete="email" maxlength="100" placeholder="you@example.com">

        <div class="reset-actions">
          <button type="submit" class="btn">Send Reset Email</button>
          <a href="auth.html" class="btn outline">Back to Sign In</a>
        </div>

        <p id="reset-msg" class="reset-msg" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-brand">Kaarlight</div>
